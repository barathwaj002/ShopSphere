<!DOCTYPE html>
<html lang="en">

<head>

    content="width=device-width, initial-scale=1.0"

  <!-- Browser Tab Icon -->

    type="image/png"
    href="/logo.png"
  />

  <!-- Apple Devices -->

    rel="apple-touch-icon"
    href="/logo.png"
  />

  <!-- Browser Theme -->

    content="#7C3AED"

  />

  <meta
    property="og:title"
    content="ShopSphere | Smart E-Commerce Platform"

    content="Experience premium online shopping with ShopSphere."

  <meta
    property="og:image"
    content="/logo.png"
  />

    content="website"

  <title>
    ShopSphere | Smart E-Commerce Platform
  </title>
